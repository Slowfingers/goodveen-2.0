version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: goodveen-db
    environment:
      POSTGRES_DB: goodveen
      POSTGRES_USER: goodveen
      POSTGRES_PASSWORD: ${DB_PASSWORD:-goodveen_secure_password_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodveen"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    build: .
    container_name: goodveen-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
      - "3001:3001"
    environment:
      # Database (Local PostgreSQL)
      DATABASE_URL: postgresql://goodveen:${DB_PASSWORD:-goodveen_secure_password_2024}@db:5432/goodveen
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # Admin
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      
      # Supabase Storage (опционально)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS}
      
      # Node
      NODE_ENV: production
      PORT: 3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
